<!-- JOIN NOW BUTTON -->
<button class="join-btn" onclick="openJoinModal()">
  Join Now
</button>

<!-- JOIN MODAL -->
<div class="join-modal" id="joinModal">

  <div class="join-content">

    <span class="close-modal" onclick="closeJoinModal()">×</span>

    <h2>Create Your MEMO Account</h2>

    <!-- CREATE ACCOUNT -->
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email Address">
    <input type="password" placeholder="Create Password">

    <h3>Select Subscription</h3>

    <select>
      <option>Basic - $4.99/month</option>
      <option>Standard - $9.99/month</option>
      <option>Premium - $14.99/month</option>
    </select>

    <h3>Add Payment Method</h3>

    <input type="text" placeholder="Cardholder Name">
    <input type="text" placeholder="Card Number">
    
    <div class="card-row">
      <input type="text" placeholder="MM/YY">
      <input type="text" placeholder="CVV">
    </div>

    <button class="create-account-btn">
      Create Account & Subscribe
    </button>

  </div>

</div>

<style>

.join-btn{
  background:#1e90ff;
  color:white;
  border:none;
  padding:14px 28px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  margin-left:20px;
}

.join-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3000;
}

.join-content{
  background:#081b33;
  width:420px;
  max-width:95%;
  padding:35px;
  border-radius:18px;
  position:relative;
}

.join-content h2{
  margin-bottom:25px;
}

.join-content h3{
  margin-top:20px;
  margin-bottom:10px;
}

.join-content input,
.join-content select{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#10294d;
  color:white;
}

.card-row{
  display:flex;
  gap:10px;
}

.create-account-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:white;
  font-size:17px;
  cursor:pointer;
  margin-top:15px;
}

.close-modal{
  position:absolute;
  top:15px;
  right:20px;
  font-size:28px;
  cursor:pointer;
}

</style>

<script>

function openJoinModal(){
  document.getElementById("joinModal")
  .style.display = "flex";
}

function closeJoinModal(){
  document.getElementById("joinModal")
  .style.display = "none";
}

</script>
