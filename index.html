
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEMO Streaming</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#021224;
      color:white;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 50px;
      background:#010b16;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      color:#1e90ff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      transition:0.3s;
    }

    nav a:hover{
      color:#1e90ff;
    }

    .hero{
      height:90vh;
      background:
      linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1400&auto=format&fit=crop')
      center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero-content h1{
      font-size:65px;
      margin-bottom:20px;
    }

    .hero-content p{
      font-size:22px;
      margin-bottom:30px;
    }

    .btn{
      background:#1e90ff;
      color:white;
      padding:15px 35px;
      border:none;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#0073e6;
    }

    .section{
      padding:60px 50px;
    }

    .section h2{
      margin-bottom:30px;
      font-size:32px;
    }

    .movies{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:25px;
    }

    .movie-card{
      background:#0b2345;
      border-radius:12px;
      overflow:hidden;
      transition:0.3s;
    }

    .movie-card:hover{
      transform:scale(1.05);
    }

    .movie-card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .movie-info{
      padding:15px;
    }

    footer{
      background:#010b16;
      text-align:center;
      padding:25px;
      margin-top:40px;
    }

    @media(max-width:768px){
      .hero-content h1{
        font-size:42px;
      }

      header{
        flex-direction:column;
      }

      nav{
        margin-top:15px;
      }
    }

  </style>
</head>

<body>

  <header>
    <div class="logo">MEMO</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Movies</a>
      <a href="#">TV Shows</a>
      <a href="#">Trending</a>
      <a href="#">My List</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Unlimited Movies & TV Shows</h1>
      <p>Watch anytime, anywhere with MEMO Streaming</p>
      <button class="btn">Start Watching</button>
    </div>
  </section>

  <section class="section">
    <h2>Trending Now</h2>

    <div class="movies">

      <div class="movie-card">
        <img src="https://picsum.photos/300/400?1">
        <div class="movie-info">
          <h3>Night Hunter</h3>
          <p>Action • Thriller</p>
        </div>
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/300/400?2">
        <div class="movie-info">
          <h3>Dark City</h3>
          <p>Drama • Mystery</p>
        </div>
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/300/400?3">
        <div class="movie-info">
          <h3>Future World</h3>
          <p>Sci-Fi • Adventure</p>
        </div>
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/300/400?4">
        <div class="movie-info">
          <h3>Last Kingdom</h3>
          <p>TV Series</p>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 MEMO Streaming Platform</p>
  </footer>

</body>
</html>
